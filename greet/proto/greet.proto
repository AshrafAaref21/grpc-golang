syntax = "proto3";

package greet;

option go_package = "github.com/AshrafAaref21/grpc-golang/greet/proto";

message GreetRequest {
    string first_name = 1;
}

message GreetResponse {
    string message = 1;
}

// GreetService exposes greeting-related RPCs.
service GreetService {
    // Greet returns a greeting message for the provided request.
    rpc Greet(GreetRequest) returns (GreetResponse);
    // GreetManyTimes returns a stream of greeting message for the provided request.
    rpc GreetManyTimes(GreetRequest) returns (stream GreetResponse);
    // LongGreet receives a stream of greeting requests and returns a single greeting response after processing all requests.
    rpc LongGreet(stream GreetRequest) returns (GreetResponse);
    // GreetEverone receives a stream of greeting requests and  returns a stream of greeting message for the provided request.
    rpc GreetEverone(stream GreetRequest) returns (stream GreetResponse);
    // GreetWithDeadline returns a greeting message for the provided request, but it respects the deadline sent by the client.
    rpc GreetWithDeadline(GreetRequest) returns (GreetResponse);
}