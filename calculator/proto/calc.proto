syntax = "proto3";

package calculator;

option go_package = "github.com/AshrafAaref21/grpc-golang/calculator/proto";

import "avg.proto";
import "max.proto";
import "primes.proto";
import "sqrt.proto";
import "sum.proto";

// CalculatorService exposes calculator-related RPCs.
service CalculatorService {
    // Sum returns the sum of two numbers.
    rpc Sum(SumRequest) returns (SumResponse);
    // Primes returns a stream of prime numbers up to a given limit.
    rpc Primes(PrimesRequest) returns (stream PrimesResponse);
    // Avg calculates the average of a stream of numbers and returns the result.
    rpc Avg(stream AvgRequest) returns (AvgResponse);
    // Max receives a stream of numbers and returns a stream of the current maximum number after each new number is received.
    rpc Max(stream MaxRequest) returns (stream MaxResponse);
    // 
    rpc Sqrt(SqrtRequest) returns (SqrtResponse);
}
